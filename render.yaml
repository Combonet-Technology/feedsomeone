services:
  - type: web
    name: feedsomeone
    runtime: docker
    repo: https://github.com/Combonet-Technology/feedsomeone.git
    branch: main
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    preDeployCommand: python manage.py migrate
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: SETTINGS
        value: config.settings.prod
      - key: DEBUG
        value: "false"
      - key: SITE_ID
        value: "4"
      - key: ALLOWED_HOSTS
        value: oef-service.onrender.com oluwafemiebenezerfoundation.org www.oluwafemiebenezerfoundation.org
      - key: ALLOWED_CSRF
        value: https://oef-service.onrender.com https://oluwafemiebenezerfoundation.org https://www.oluwafemiebenezerfoundation.org
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_GALLERY_ENABLED
        sync: false
      - key: CLOUDINARY_GALLERY_CACHE_SECONDS
        value: "900"
      - key: CLOUDINARY_GALLERY_PUBLICATION_TAG
        value: publication-approved
      - key: RECAPTCHA_PUBLIC_KEY_v3
        sync: false
      - key: RECAPTCHA_PRIVATE_KEY_v3
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: Oluwafemi Ebenezer Foundation
      - key: BREVO_REPLY_TO_EMAIL
        sync: false
      - key: BREVO_CONTACT_RECIPIENTS
        sync: false
      - key: BREVO_NEWSLETTER_LIST_ID
        value: "2"
      - key: HONEYPOT_FIELD_NAME
        value: phonenumber
      - key: HONEYPOT_VALUE
        value: "+234812345678"
