name: Keep Render Service Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Ping website
        run: |
          curl --fail \
            --location \
            --silent \
            --show-error \
            --connect-timeout 10 \
            --max-time 110 \
            --retry 5 \
            --retry-all-errors \
            --retry-delay 10 \
            https://oluwafemiebenezerfoundation.org/

      - name: Slack Notification
        uses: slackapi/slack-github-action@v3.0.3
        if: ${{ always() }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "Render keep-awake ping result: ${{ job.status }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
