{% load honeypot %}
<form id="subscribenow" class="footer-newsletter"
      action="{% url 'newsletter'%}"
      method="post" novalidate>
    {% csrf_token %}
    {% render_honeypot_field %}
    <input class="input" id="footer-input" type="email" name="email" placeholder="Enter your email">
    <button class="primary-button">Subscribe</button>
</form>
