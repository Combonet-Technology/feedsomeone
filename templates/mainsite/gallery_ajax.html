{% for image in objects %}
<div class="col-lg-3 col-md-4 col-sm-6 mb-30">
    <a href="{{ image.url }}" class="img-pop-up" aria-label="Open {{ image.alt }}">
        <img
            class="img-fluid"
            src="{{ image.thumbnail_url }}"
            width="640"
            height="480"
            loading="lazy"
            decoding="async"
            alt="{{ image.alt }}">
    </a>
</div>
{% endfor %}
